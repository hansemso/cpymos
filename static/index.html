<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CPyMOS Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#222;
font-family:monospace;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

#chartBox{
width:90vh;
height:90vh;
max-width:90vw;
}

canvas{
background:#2b2b2b;
}
</style>
</head>

<body>

<div id="chartBox">
<canvas id="vectorGraph"></canvas>
</div>

<script>

const ctx=document.getElementById('vectorGraph');

const chart=new Chart(ctx,{
type:'scatter',

data:{
datasets:[]
},

options:{
responsive:true,
maintainAspectRatio:true,
aspectRatio:1,

layout:{
padding:{
bottom:70,
left:30,
right:20,
top:20
}
},

scales:{

x:{
min:0,
max:10,
ticks:{
stepSize:1,
autoSkip:false,
color:"#ddd"
},
grid:{color:"#444"}
},

y:{
min:0,
max:10,
ticks:{
stepSize:1,
color:"#ddd"
},
grid:{color:"#444"}
}

},

plugins:{
legend:{display:false},
annotation:{annotations:{}}
}

}

});

function updateGraph(){

fetch("/api/result")

.then(r=>r.json())

.then(data=>{

if(!Array.isArray(data.result)) return;

const annotations={};

data.result.forEach((value,index)=>{

const x=index+1;
const y=Math.round(value);

annotations["arrow"+index]={
type:'line',
xMin:0,
yMin:0,
xMax:x,
yMax:y,
borderColor:'#00ff66',
borderWidth:2,
arrowHeads:{
end:{display:true}
}
};

});

chart.options.plugins.annotation.annotations=annotations;

chart.update();

});

}

setInterval(updateGraph,1000);

</script>

</body>
</html>
